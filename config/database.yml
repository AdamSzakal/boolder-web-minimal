default: &default
  adapter: postgis
  encoding: unicode
  postgis_extension: postgis      # default is postgis
  postgis_schema: public          # default is public
  schema_search_path: public,postgis
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000

development:
  <<: *default
  database: dump-prod

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: boolder-test

production:
  # Render.com provides a single DATABASE_URL; all four connections share it.
  # The URL must use the postgis:// scheme for the activerecord-postgis-adapter.
  primary:
    <<: *default
    url: <%= ENV["DATABASE_URL"]&.sub("postgres://", "postgis://") %>
  cache:
    <<: *default
    url: <%= ENV["DATABASE_URL"]&.sub("postgres://", "postgis://") %>
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    url: <%= ENV["DATABASE_URL"]&.sub("postgres://", "postgis://") %>
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    url: <%= ENV["DATABASE_URL"]&.sub("postgres://", "postgis://") %>
    migrations_paths: db/cable_migrate