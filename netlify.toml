# Redirect root to areas page
[[redirects]]
  from = "/"
  to = "/areas/"
  status = 301

# Redirect old /en/ paths to new structure
[[redirects]]
  from = "/en/fontainebleau/*"
  to = "/areas/:splat"
  status = 301

[[redirects]]
  from = "/en/map/*"
  to = "/map/:splat"
  status = 301

[[redirects]]
  from = "/en/projects/*"
  to = "/projects/:splat"
  status = 301

[[redirects]]
  from = "/en/weather/*"
  to = "/weather/:splat"
  status = 301

[[redirects]]
  from = "/en/*"
  to = "/:splat"
  status = 301

# SPA-style fallback for map routes
[[redirects]]
  from = "/map/*"
  to = "/map/index.html"
  status = 200

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
