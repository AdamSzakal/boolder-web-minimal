[build]
  publish = "dist"
  command = "echo 'Serving pre-built dist/'"
  ignore = "git diff --quiet $CACHED_COMMIT HEAD -- dist/"

[build.environment]
  # Prevent Netlify from running bundle install for the Rails Gemfile
  BUNDLE_GEMFILE = "/dev/null"

# Redirect root to /en/
[[redirects]]
  from = "/"
  to = "/en/"
  status = 301

# Pretty URLs: /en/fontainebleau/area-slug -> /en/fontainebleau/area-slug/index.html
# Netlify handles this automatically for index.html files

# SPA-style fallback for map routes
[[redirects]]
  from = "/en/map/*"
  to = "/en/map/index.html"
  status = 200

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
