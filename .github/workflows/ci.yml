name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Run tests
        run: |
          for f in test/static/*_test.rb; do
            ruby -Itest -Iscripts/static "$f"
          done

      - name: Build static site
        env:
          MAPBOX_PUBLIC_TOKEN: ${{ secrets.MAPBOX_PUBLIC_TOKEN }}
        run: ruby scripts/static/build.rb

      - name: Verify build output
        run: bash scripts/static/verify_build.sh
